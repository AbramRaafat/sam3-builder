name: Build sam3cpp Windows Wheel
on:
  workflow_dispatch:
  push:
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Initialize Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Fetch Backend Fork
        run: git clone --depth 1 --recurse-submodules --shallow-submodules https://github.com/omar-A-hassan/sam3.cpp
        
      - name: Compile Native Extension
        run: |
          cd sam3.cpp
          python -m pip install setuptools wheel cmake pybind11 scikit-build-core
          
          # Instructs the underlying CMake process to compile the pybind wrapper.
          $env:CMAKE_ARGS="-DSAM3_BUILD_PYBIND=ON"
          
          # Generates the architecture-specific binary wheel in the dist/ directory.
          python -m pip wheel . -w dist/ --no-deps
          
      - name: Archive Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sam3cpp-windows-wheel
          path: sam3.cpp/dist/*.whl
