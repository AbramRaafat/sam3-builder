name: Build sam3cpp Windows Wheel
on:
  workflow_dispatch:
  push:
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Clone Developer Fork
        # Target the fork containing the pending pybind11 implementation.
        run: git clone --depth 1 --recurse-submodules --shallow-submodules https://github.com/omar-A-hassan/sam3.cpp
        
      - name: Build the Python Wheel
        run: |
          cd sam3.cpp
          python -m pip install setuptools wheel cmake pybind11 scikit-build-core
          
          # Inject CMake configuration to trigger the pybind11 wrapper compilation.
          $env:CMAKE_ARGS="-DSAM3_BUILD_PYBIND=ON"
          
          # Execute isolated wheel build.
          python -m pip wheel . -w dist/ --no-deps
          
      - name: Upload Finished File
        uses: actions/upload-artifact@v4
        with:
          name: sam3cpp-windows-wheel
          path: sam3.cpp/dist/*.whl
